<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#16a34a" />
    <title>Social Connect — Acceso</title>
    <link rel="stylesheet" href="css/theme.css?v=22" />
  </head>
  <body>
    <div class="shell shell--auth">
      <main class="panel" aria-labelledby="login-title">
        <header class="brand">
          <span class="brand__mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
              <rect x="3" y="3" width="7.5" height="7.5" rx="2" opacity="0.95" />
              <rect x="13.5" y="3" width="7.5" height="7.5" rx="2" opacity="0.95" />
              <rect x="3" y="13.5" width="7.5" height="7.5" rx="2" opacity="0.95" />
              <rect x="13.5" y="13.5" width="7.5" height="7.5" rx="2" opacity="0.95" />
            </svg>
          </span>
          <h1 id="login-title" class="brand__title">Social Connect</h1>
          <p class="brand__sub">Gestión de clubes — inicio de sesión</p>
        </header>

        <form id="login-form" novalidate>
          <div class="form__row">
            <label for="username">Usuario</label>
            <input
              class="input"
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              placeholder="admin"
              required
            />
          </div>
          <div class="form__row">
            <label for="password">Contraseña</label>
            <input
              class="input"
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit" class="btn btn--block">Entrar</button>
          <p id="login-message" class="msg" role="status" aria-live="polite"></p>
        </form>

      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth-helpers.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
