<div class="tpv-pos">
  <header class="tpv-pos__header">
    <div class="tpv-pos__header-main">
      <h2 class="tpv-pos__title" id="tpv-title">TPV</h2>
      <p id="tpv-shift-banner" class="tpv-pos__shift status-pill" role="status">Comprobando turno…</p>
    </div>
    <label class="tpv-pos__sync-toggle">
      <input type="checkbox" id="tpv-link-grams" checked />
      <span>Sincronizar ticket → reales</span>
    </label>
  </header>

  <div class="tpv-pos__workspace">
    <nav id="tpv-cat-nav" class="tpv-pos__sidebar" aria-label="Categorías">
      <!-- Categorías verticales (JS) -->
    </nav>
    <div id="tpv-cat-chips" class="visually-hidden" aria-hidden="true"></div>

    <main class="tpv-pos__catalog">
      <div class="tpv-pos__toolbar">
        <label class="tpv-pos__search">
          <svg class="tpv-pos__search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="7" /><path d="M20 20l-3-3" />
          </svg>
          <span class="visually-hidden">Buscar producto</span>
          <input
            type="search"
            id="tpv-search"
            class="tpv-pos__search-input"
            placeholder="Buscar producto…"
            autocomplete="off"
          />
        </label>
        <span id="tpv-product-count" class="tpv-pos__count hint"></span>
      </div>
      <div id="tpv-product-grid" class="tpv-prod-grid" role="list"></div>
    </main>

    <aside class="tpv-pos__ticket" aria-label="Ticket de venta">
      <div id="tpv-ticket-paper" class="tpv-ticket-paper">
        <div class="tpv-ticket-inner">
          <header class="tpv-ticket-head">
            <p class="tpv-ticket-kicker">Ticket</p>
            <div id="tpv-selected-label" class="tpv-ticket-product-name">Selecciona un producto</div>
          </header>
          <input type="hidden" id="tpv-selected-product" value="" />

          <div class="tpv-ticket-scroll">
            <section class="tpv-ticket-block tpv-ticket-block--cart" aria-labelledby="tpv-lbl-cart">
              <div class="tpv-ticket-block__head">
                <h3 class="tpv-ticket-block__title" id="tpv-lbl-cart">Pedido</h3>
                <button type="button" class="btn btn--ghost btn--small" id="tpv-clear-cart">Vaciar</button>
              </div>
              <div id="tpv-cart-list" class="tpv-cart-list"></div>
              <div class="tpv-cart-total-wrap">
                <span class="tpv-cart-total-label">Total</span>
                <strong id="tpv-cart-total" class="tpv-cart-total">0,00 €</strong>
              </div>
            </section>

            <section class="tpv-ticket-block" aria-labelledby="tpv-lbl-socio">
              <h3 class="tpv-ticket-block__title" id="tpv-lbl-socio">Socio</h3>
              <div class="form__row tpv-member-field tpv-ticket-field">
                <label class="tpv-ticket-sr-label" for="tpv-member-search">Buscar socio</label>
                <div class="tpv-member-wrap">
                  <input
                    type="search"
                    id="tpv-member-search"
                    class="input input--ticket"
                    placeholder="Nombre o código…"
                    autocomplete="off"
                  />
                  <button type="button" class="btn btn--ghost btn--small" id="tpv-member-clear">Quitar</button>
                </div>
                <input type="hidden" id="tpv-selected-member" value="" />
                <div id="tpv-member-dropdown" class="tpv-member-dropdown is-hidden" role="listbox" hidden></div>
                <div id="tpv-member-chip-wrap" class="tpv-member-chip-wrap is-hidden" hidden>
                  <div class="tpv-member-chip-avatar" aria-hidden="true">
                    <img id="tpv-member-chip-img" class="tpv-member-chip-img is-hidden" src="" alt="" />
                    <span id="tpv-member-chip-initials" class="tpv-member-chip-initials">?</span>
                  </div>
                  <p id="tpv-member-chip" class="tpv-ticket-chip tpv-member-chip"></p>
                </div>
                <div id="tpv-wallet-funds" class="tpv-wallet-funds is-hidden" hidden>
                  <p id="tpv-wallet-funds-balance" class="hint tpv-wallet-funds-balance"></p>
                  <label class="tpv-wallet-funds-cash-toggle">
                    <input type="checkbox" id="tpv-wallet-funds-cash" checked />
                    Movimiento en efectivo (caja del turno)
                  </label>
                  <div class="tpv-wallet-funds__row">
                    <input class="input input--ticket" id="tpv-wallet-funds-amount" type="number" inputmode="decimal" step="0.01" min="0.01" placeholder="Importe €" />
                    <input class="input input--ticket" id="tpv-wallet-funds-notes" type="text" placeholder="Motivo (opc.)" autocomplete="off" />
                    <button type="button" class="btn btn--small" id="tpv-wallet-funds-add">+ Ingresar</button>
                    <button type="button" class="btn btn--ghost btn--small" id="tpv-wallet-funds-sub">− Retirar</button>
                  </div>
                  <p id="tpv-wallet-funds-status" class="msg tpv-wallet-funds-status" role="status"></p>
                </div>
              </div>
            </section>

            <section class="tpv-ticket-block" aria-labelledby="tpv-lbl-grams">
              <h3 class="tpv-ticket-block__title" id="tpv-lbl-grams">Cantidad</h3>
              <div class="tpv-ticket-dual">
                <div class="tpv-ticket-field">
                  <label for="tpv-grams-charged" id="tpv-label-charged">En ticket</label>
                  <input class="input input--ticket" id="tpv-grams-charged" inputmode="decimal" placeholder="0,5" />
                </div>
                <div class="tpv-ticket-field">
                  <label for="tpv-grams-dispensed" id="tpv-label-real">Reales</label>
                  <input class="input input--ticket" id="tpv-grams-dispensed" inputmode="decimal" placeholder="0,52" />
                </div>
              </div>
              <p id="tpv-margin-hint" class="tpv-ticket-hint"></p>
              <div class="tpv-stepper" id="tpv-stepper" aria-label="Ajuste rápido">
                <button type="button" class="tpv-step" data-tpv-step="-0.1">−0,1</button>
                <button type="button" class="tpv-step" data-tpv-step="-0.05">−0,05</button>
                <button type="button" class="tpv-step" data-tpv-step="0.05">+0,05</button>
                <button type="button" class="tpv-step" data-tpv-step="0.1">+0,1</button>
              </div>
            </section>

            <section class="tpv-ticket-block" aria-labelledby="tpv-lbl-money">
              <h3 class="tpv-ticket-block__title" id="tpv-lbl-money">Cobro</h3>
              <div class="tpv-ticket-field">
                <label for="tpv-price">Precio (€)</label>
                <input class="input input--ticket input--price" id="tpv-price" inputmode="decimal" placeholder="0,50" />
              </div>
              <div class="tpv-pay-method" role="group" aria-labelledby="tpv-lbl-pay-method">
                <span class="tpv-pay-method__label" id="tpv-lbl-pay-method">Forma de pago</span>
                <div class="tpv-pay-method__seg">
                  <label class="tpv-pay-method__opt">
                    <input type="radio" name="tpv-payment-method" value="cash" checked />
                    Efectivo
                  </label>
                  <label class="tpv-pay-method__opt">
                    <input type="radio" name="tpv-payment-method" value="wallet" />
                    Monedero
                  </label>
                </div>
                <p id="tpv-wallet-balance" class="hint tpv-wallet-balance is-hidden" hidden></p>
                <p id="tpv-wallet-preview" class="hint tpv-wallet-preview is-hidden" hidden></p>
              </div>
            </section>

            <section class="tpv-ticket-block tpv-ticket-block--compact">
              <div class="tpv-ticket-field">
                <label for="tpv-notes">Nota</label>
                <input class="input input--ticket" id="tpv-notes" placeholder="Opcional…" autocomplete="off" />
              </div>
            </section>

            <div class="tpv-ticket-stock-wrap">
              <p id="tpv-stock-hint" class="tpv-ticket-stock"></p>
            </div>
          </div>

          <footer class="tpv-ticket-actions">
            <button type="button" class="btn tpv-cobrar" id="tpv-submit">
              <span class="tpv-cobrar__label">Cobrar</span>
              <span class="tpv-cobrar__hint">Enter ↵</span>
            </button>
            <p id="tpv-status" class="msg tpv-ticket-status" role="status" aria-live="polite"></p>
          </footer>
        </div>
      </div>
    </aside>
  </div>

  <details class="tpv-pos__recent sc-collapse">
    <summary>Últimas ventas</summary>
    <div class="table-wrap tpv-recent-table-wrap">
      <table class="table-compact">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Dispensador</th>
            <th>Producto</th>
            <th>Socio</th>
            <th>Cant. ticket / real</th>
            <th>Precio</th>
            <th>Nota</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tpv-recent-tbody"></tbody>
      </table>
    </div>
  </details>

  <div id="tpv-success-overlay" class="tpv-overlay is-hidden" aria-hidden="true">
    <div class="tpv-overlay__icon" aria-hidden="true">✓</div>
    <p class="tpv-overlay__title">Venta registrada</p>
    <p id="tpv-overlay-detail" class="tpv-overlay__sub"></p>
  </div>
</div>
