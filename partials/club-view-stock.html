<div class="club-view-stage sc-stock-layout">
<section class="card-section sc-stock-banner stock-shell" aria-labelledby="stock-title">
  <div class="sc-section-head">
    <h2 id="stock-title">Stock del turno</h2>
    <p id="stock-shift-banner" class="hint stock-shift-banner status-pill sc-section-head__meta" role="status">
      Comprobando turno…
    </p>
  </div>
  <p class="hint sc-hint-inline">
    Registra el stock físico en el <strong>turno abierto</strong> (abrir/cerrar en Inicio).
  </p>
</section>

<section class="card-section sc-stock-main" aria-labelledby="stock-manual-title">
  <h2 id="stock-manual-title">Contaje manual</h2>
  <p class="hint sc-hint-collapsed">
    Con <strong>bote</strong>: peso total en báscula (se resta tara). Sin bote: stock neto directo.
  </p>
  <div class="inv-toolbar sc-toolbar-inline">
    <div class="form__row" style="margin-bottom: 0">
      <label for="stk-filter-category">Categoría</label>
      <select class="select" id="stk-filter-category">
        <option value="">Todas</option>
      </select>
    </div>
    <div class="form__row" style="margin-bottom: 0">
      <label for="stk-sort-by">Orden</label>
      <select class="select" id="stk-sort-by">
        <option value="name_asc">Nombre (A-Z)</option>
        <option value="name_desc">Nombre (Z-A)</option>
        <option value="stock_asc">Stock ↑</option>
        <option value="stock_desc">Stock ↓</option>
        <option value="category">Categoría</option>
      </select>
    </div>
    <div id="stk-cat-chips" class="chip-row sc-chip-row-compact" aria-label="Categorías"></div>
  </div>
  <div class="table-wrap sc-table-fill">
    <table class="table-compact">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Stock</th>
          <th>Nuevo (g)</th>
          <th>Descuadre</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="stock-manual-tbody"></tbody>
    </table>
  </div>
  <p id="stock-status" class="msg" role="status" aria-live="polite"></p>
</section>
</div>
